setting_3 : "လူတိုင်း : ဤအဖွဲ့တွင် ရှိနေသူ မည်သူမဆို အက်ဒမင် Command များကို အသုံးပြုနိုင်သည်။ [ကျော်ရန်၊ ရပ်ရန်၊ ပြန်ဖွင့်ရန် စသဖြင့်]\n\nအက်ဒမင်သာ : အက်ဒမင်များနှင့် အတည်ပြုထားသော အသုံးပြုသူများသာ အက်ဒမင် Command များကို အသုံးပြုနိုင်သည်။"
setting_4 : "အတည်ပြုထားသော အသုံးပြုသူများ မတွေ့ရှိပါ။"
setting_5 : "အဖွဲ့ : Command ပေးသည့် အဖွဲ့တွင်သာ သီချင်းဖွင့်သည်။\n\n» ချန်နယ် : သင်အလိုရှိသော ချန်နယ်တွင် သီချင်းဖွင့်သည်။ ချန်နယ် ID ကို သတ်မှတ်ရန်"
