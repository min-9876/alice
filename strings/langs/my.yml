start_1 : "{0} အသက်ဝင်နေပါသည်။\n\n<b>✫ uptime :</b> {1}"
start_2 : "<b>────「 {1} 」────</b>\n\n<b>မင်္ဂလာပါ {0} ! !</b>\n\n<b>ကျွန်ုပ်သည် ထူးခြားသော လုပ်ဆောင်ချက်များစွာပါဝင်သည့် အမြန်ဆန်ဆုံးနှင့် စွမ်းအားအပြည့်ဆုံး Music Player ဘော့ဖြစ်ပါသည်။</b>\n➖➖➖➖➖➖➖➖➖➖➖➖➖\n<b>➥Uptime:</b> {2}\n<b>➥ServerStorage:</b> {3}\n<b>➥CPU Load:</b> {4}\n<b>➥RAM Consumption:</b> {5}\n➖➖➖➖➖➖➖➖➖➖➖➖➖\nကျွန်ုပ်၏ Module များနှင့် Command များအကြောင်း သိရှိရန် Help ခလုတ်ကို နှိပ်ပါ။"
start_3 : "ဟေ့ {0} ,\nကျွန်ုပ်သည် {1} ဖြစ်ပါသည်\n\nကျွန်ုပ်ကို {2} တွင် ထည့်သွင်းပေးသည့်အတွက် ကျေးဇူးတင်ပါသည်၊ {3} သည် ဤချတ်တွင် သီချင်းများဖွင့်ပေးနိုင်ပါသည်။"
start_4 : "🎄 <b>SuperGroup လိုအပ်ပါသည်</b> 🎄\n\nကျေးဇူးပြု၍ သင်၏ <b>အဖွဲ့ (Group)</b> ကို <b>SuperGroup</b> သို့ ပြောင်းလဲပြီးလျှင် ကျွန်ုပ်ကို ပြန်လည်ထည့်သွင်းပေးပါ။\n\n<b>SuperGroup ဘယ်လိုလုပ်ရမလဲ?</b>\n- သင်၏ အဖွဲ့၏ ချတ်မှတ်တမ်းကို တစ်ကြိမ် <b>Visible (မြင်နိုင်ရန်)</b> ပြောင်းလိုက်ပါ။"
start_5 : "<b>↝ ပိတ်ပင်ထားသော အဖွဲ့များ (Blacklisted Chats) ↜</b>\n\nဤချတ်ကို {0} ဒေတာဘေ့စ်တွင် ပိတ်ပင်ထားပါသည်။\nသင်၏ ချတ်ကို ပိတ်ပင်မှုမှ ဖယ်ရှားပေးရန် <a href={1}>SudoUser</a> တစ်ဦးကို တောင်းဆိုပါ သို့မဟုတ် <a href={2}>Support Chat</a> သို့ သွားရောက်ပါ။"
start_6 : "😲 <b>သီချင်း အချက်အလက်</b> 😲\n\n📌 <b>ခေါင်းစဉ် :</b> {0}\n\n⏳ <b>ကြာချိန် :</b> {1} မိနစ်\n👀 <b>ကြည့်ရှုသူ :</b> <code>{2}</code>\n⏰ <b>တင်ထားသည့်နေ့စွဲ :</b> {3}\n📎 <b>ချန်နယ် :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 ရှာဖွေမှု ပံ့ပိုးသူ {6}</b></u>"

help_1 : "အကူအညီရယူလိုသော အမျိုးအစားကို ရွေးချယ်ပါ။\nမေးမြန်းလိုသည်များကို <a href={0}>Support Chat</a> တွင် မေးမြန်းနိုင်ပါသည်။\n\nCommand အားလုံးကို : <code>/</code> ဖြင့် အသုံးပြုနိုင်ပါသည်။"
